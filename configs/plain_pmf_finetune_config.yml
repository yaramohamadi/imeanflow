dataset:
    root: /home/ens/AT74470/datasets/caltech-101_images
    name: imgnet_pixels
    image_size: 256
    image_channels: 3
    num_classes: 101
    num_classes_from_data: True
    num_workers: 4
    prefetch_factor: 2
    pin_memory: False

model:
    model_str: pmfDiT_H_16
    num_classes: 101
    cfg_beta: 1.0
    cfg_max: 7.0
    P_mean: 0.0
    P_std: 0.8
    noise_scale: 2.0
    lpips: True
    lpips_lambda: 0.4
    convnext: True
    convnext_lambda: 0.1
    perceptual_max_t: 0.6
    tr_uniform: True

training:
    log_per_step: 50
    checkpoint_per_epoch: 1000000

    num_epochs: 200
    max_train_steps: 30000
    batch_size: 16
    use_ema: False
    learning_rate: 0.00001
    warmup_epochs: 5

    adam_b2: 0.95
    optimizer: muon
    optimizer_mu_dtype: float16
    weight_decay: 0.0
    lion_b2: 0.99
    sgd_momentum: null
    ema_type: const
    ema_val: 0.9999

    sample_per_step: 5000
    fid_per_step: 0
    fid_schedule:
        - from_step: 0
          until_step: 20000
          every_steps: 5000
        - from_step: 20000
          every_steps: 2500
    metric_num_steps:
        - 1
    preview_guidance_scales:
        - 1
        - 4
        - 7
    preview_num_steps:
        - 1
        - 2
        - 4
    preview_at_step0: True
    grad_accum_steps: 2
    save_best_fid_only: True
    best_fid_checkpoint_dir: best_fid
    save_eval_checkpoint_per_fid: True
    eval_checkpoint_dir: latest_eval
    half_precision: False
    half_precision_dtype: float16

    seed: 42

fid:
    device_batch_size: 16
    sample_device_batch_size: 8
    sample_log_every: 1
    sample_first_device_only: False
    num_samples: 10000
    cache_ref: /home/ens/AT74470/imeanflow/files/fid_stats/caltech-101-fid_stats.npz
    num_images_to_log: 16

fd_dino:
    arch: vitb14
    model_name: ''
    cache_ref: /home/ens/AT74470/imeanflow/files/fdd_stats/caltech-101-fd_dino-vitb14_stats.npz

sampling:
    num_steps: 1
    method: meanflow
    half_precision: False
    half_precision_dtype: float16
    omega: 7.0
    cfg_scale: 7.0
    t_min: 0.2
    t_max: 0.6

logging:
    use_wandb: True
    wandb_name: ''
    wandb_project: plain_pmf_finetune
    wandb_entity: yara-mohammadi-bahram-1-ecole-superieure-de-technologie
    wandb_tags:
        - finetune
        - plain-pmf
    wandb_notes: pMF-H/16 pixel-space fine-tuning without perceptual aux losses

load_from: /home/ens/AT74470/imeanflow/files/weights/pMF-H-16-full
load_ema: '1000'
partial_load: True
