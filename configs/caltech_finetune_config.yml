dataset:
    root: /home/ens/AT74470/datasets/caltech-101_processed_latents
    num_classes: 101
    num_classes_from_data: True

model:
    model_str: imfDiT_XL_2
    num_classes: 101
    cfg_beta: 1.0
    use_dogfit: True
    target_use_null_class: False
    class_dropout_prob: 0.0
    source_prediction_space: 'v'
    source_num_classes: 1000

training:
    log_per_step: 50
    checkpoint_per_epoch: 1000000

    num_epochs: 200
    max_train_steps: 30000
    batch_size: 16
    use_ema: False
    learning_rate: 0.0001
    warmup_epochs: 5

    adam_b2: 0.95
    ema_type: 'const'

    sample_per_step: 500
    fid_per_step: 1000 # Frequency of FID calculation in steps
    grad_accum_steps: 2
    save_best_fid_only: True
    best_fid_checkpoint_dir: 'best_fid'
    capture_source_from_load: True

    seed: 42

fid:
    device_batch_size: 32
    num_samples: 50000
    cache_ref: '/home/ens/AT74470/imeanflow/files/fid_stats/caltech-101-fid_stats.npz'
    num_images_to_log: 100 # Number of images to log as a grid during FID evaluation

fd_dino:
    arch: vitb14
    model_name: ''
    cache_ref: '/home/ens/AT74470/imeanflow/files/fdd_stats/caltech-101-fd_dino-vitb14_stats.npz'

sampling:
    num_steps: 1
    omega: 7.5
    t_min: 0.4
    t_max: 0.65

logging:
    use_wandb: True # set to True to use wandb
    wandb_project: 'imfa_init' # change to your wandb project
    wandb_entity: 'yara-mohammadi-bahram-1-ecole-superieure-de-technologie' # paste your wandb entity here
    wandb_tags:
        - caltech101
        - finetune
    wandb_notes: 'Caltech-101 iMF fine-tuning'

load_from: '/home/ens/AT74470/imeanflow/files/weights/iMF-XL-2-full'
partial_load: True
